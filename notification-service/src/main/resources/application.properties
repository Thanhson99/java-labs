spring.application.name=notification-service
server.port=${PORT:8099}

app.messaging.kafka.enabled=${APP_MESSAGING_KAFKA_ENABLED:false}
app.messaging.kafka.topic=${APP_MESSAGING_KAFKA_TOPIC:user-registered.v1}
app.messaging.kafka.consumer-group=${APP_MESSAGING_KAFKA_CONSUMER_GROUP:notification-service}
app.messaging.rabbitmq.enabled=${APP_MESSAGING_RABBITMQ_ENABLED:false}
app.messaging.rabbitmq.exchange=${APP_MESSAGING_RABBITMQ_EXCHANGE:user.registration.exchange}
app.messaging.rabbitmq.queue=${APP_MESSAGING_RABBITMQ_QUEUE:user.registration.queue}
app.messaging.rabbitmq.routing-key=${APP_MESSAGING_RABBITMQ_ROUTING_KEY:user.registered}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
spring.kafka.consumer.group-id=${app.messaging.kafka.consumer-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.notificationservice.messaging
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.notificationservice.messaging.UserRegisteredEvent

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
