version: "3.9"

services:
  users-postgres:
    image: postgres:16
    container_name: java-labs-users-postgres
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "15432:5432"
    volumes:
      - users_postgres_data:/var/lib/postgresql/data

  analytics-postgres:
    image: postgres:16
    container_name: java-labs-analytics-postgres
    environment:
      POSTGRES_DB: analyticsdb
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "15433:5432"
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:3.7
    container_name: java-labs-kafka
    ports:
      - "19092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:19092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: java-labs-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  users_postgres_data:
  analytics_postgres_data:
