spring.application.name=spring
server.port=${PORT:8089}

spring.datasource.url=jdbc:h2:mem:usersdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=5

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.analytics.datasource.url=jdbc:h2:mem:analyticsdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
app.analytics.datasource.driver-class-name=org.h2.Driver
app.analytics.datasource.username=sa
app.analytics.datasource.password=

app.rate-limit.registration.max-requests=3
app.rate-limit.registration.window-millis=60000
app.security.api-key.header-name=X-API-Key
app.security.api-key.value=dev-secret-key
