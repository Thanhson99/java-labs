spring.application.name=spring
server.port=${PORT:8089}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:usersdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=5

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.analytics.datasource.url=${APP_ANALYTICS_DATASOURCE_URL:jdbc:h2:mem:analyticsdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
app.analytics.datasource.driver-class-name=${APP_ANALYTICS_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
app.analytics.datasource.username=${APP_ANALYTICS_DATASOURCE_USERNAME:sa}
app.analytics.datasource.password=${APP_ANALYTICS_DATASOURCE_PASSWORD:}

app.rate-limit.registration.max-requests=3
app.rate-limit.registration.window-millis=60000
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:01234567890123456789012345678901}
app.security.jwt.expiration-seconds=${APP_SECURITY_JWT_EXPIRATION_SECONDS:3600}
app.security.auth.refresh-expiration-seconds=${APP_SECURITY_REFRESH_EXPIRATION_SECONDS:604800}

app.messaging.kafka.enabled=${APP_MESSAGING_KAFKA_ENABLED:false}
app.messaging.kafka.topic=${APP_MESSAGING_KAFKA_TOPIC:user-registered.v1}
app.messaging.kafka.consumer-group=${APP_MESSAGING_KAFKA_CONSUMER_GROUP:user-registration-learning}
app.messaging.rabbitmq.enabled=${APP_MESSAGING_RABBITMQ_ENABLED:false}
app.messaging.rabbitmq.exchange=${APP_MESSAGING_RABBITMQ_EXCHANGE:user.registration.exchange}
app.messaging.rabbitmq.queue=${APP_MESSAGING_RABBITMQ_QUEUE:user.registration.queue}
app.messaging.rabbitmq.routing-key=${APP_MESSAGING_RABBITMQ_ROUTING_KEY:user.registered}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.info.java.enabled=true
management.health.rabbit.enabled=${APP_MESSAGING_RABBITMQ_ENABLED:false}
management.health.kafka.enabled=${APP_MESSAGING_KAFKA_ENABLED:false}

info.app.name=${spring.application.name}
info.app.learning-module=observability
info.app.stack=Spring MVC, Security, JPA, Flyway, Kafka, RabbitMQ
